<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KungfuClaw</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">KungfuClaw</div>
            <nav class="nav-menu">
                <a href="#features" class="nav-link">Features</a>
                <a href="#architecture" class="nav-link">Architecture</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link">Contact</a>
                <button id="language-toggle" class="nav-link">English</button>
            </nav>
            <button class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>
    <section id="hero" class="hero">
        <div class="container">
            <h1 id="hero-headline"></h1>
            <p id="hero-description"></p>
            <a href="#contact" class="cta-button" id="hero-cta"></a>
        </div>
    </section>
    <section id="features" class="features">
        <div class="container">
            <h2 id="features-title"></h2>
            <div class="feature-list">
                <div class="feature">
                    <h3 id="feature-1-title"></h3>
                    <p id="feature-1-description"></p>
                </div>
                <div class="feature">
                    <h3 id="feature-2-title"></h3>
                    <p id="feature-2-description"></p>
                </div>
                <div class="feature">
                    <h3 id="feature-3-title"></h3>
                    <p id="feature-3-description"></p>
                </div>
                <div class="feature">
                    <h3 id="feature-4-title"></h3>
                    <p id="feature-4-description"></p>
                </div>
            </div>
        </div>
    </section>
    <section id="architecture" class="architecture">
        <div class="container">
            <h2 id="architecture-title"></h2>
            <div class="diagram-placeholder">
                <p id="architecture-description"></p>
            </div>
        </div>
    </section>
    <section id="about" class="about">
        <div class="container">
            <h2 id="about-title"></h2>
            <p id="about-description"></p>
        </div>
    </section>
    <section id="contact" class="contact">
        <div class="container">
            <h2 id="contact-title"></h2>
            <form id="contact-form">
                <label for="name" id="contact-label-name"></label>
                <input type="text" id="name" name="name" required>
                <label for="email" id="contact-label-email"></label>
                <input type="email" id="email" name="email" required>
                <label for="message" id="contact-label-message"></label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit" class="cta-button" id="contact-submit"></button>
            </form>
        </div>
    </section>
    <footer>
        <div class="container">
            <p id="footer-copyright"></p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
